upstream fixmind_backend {
  server backend:3000;
}

upstream fixmind_frontend {
  server frontend:80;
}

# SECURITY: Izinkan body request hingga 15MB untuk mendukung
# upload avatar (maks 5MB) dan import Excel (maks 10MB).
client_max_body_size 15M;

# SECURITY: Security headers yang berlaku untuk seluruh virtual host.
# Didefinisikan di level http block via include, tapi karena file ini
# di-include langsung, header berada di setiap server block.
map $sent_http_content_type $referrer_policy {
  default "strict-origin-when-cross-origin";
}

server {
  listen 80;
  server_name _;

  # Redirect HTTP to HTTPS in production (uncomment when certs are ready)
  # return 301 https://$host$request_uri;

  # -----------------------------------------------------------------------
  # SECURITY HEADERS
  # -----------------------------------------------------------------------
  # Mencegah halaman dimuat dalam iframe (clickjacking protection)
  add_header X-Frame-Options "DENY" always;
  # Mencegah browser menebak MIME type (MIME sniffing protection)
  add_header X-Content-Type-Options "nosniff" always;
  # Kontrol informasi referrer yang dikirim ke situs lain
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Menonaktifkan fitur browser yang tidak diperlukan
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  # Content Security Policy — batasi sumber resource yang diizinkan
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' ws: wss:; frame-src 'none'; object-src 'none';" always;

  location /api/ {
    proxy_pass http://fixmind_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeout settings untuk request yang lama (misal AI processing)
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
  }

  location / {
    proxy_pass http://fixmind_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}

