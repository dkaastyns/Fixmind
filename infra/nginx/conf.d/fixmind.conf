upstream fixmind_backend {
  server backend:3000;
}

upstream fixmind_frontend {
  server frontend:80;
}

server {
  listen 80;
  server_name _;

  # Redirect HTTP to HTTPS in production (uncomment when certs are ready)
  # return 301 https://$host$request_uri;

  location /api/ {
    proxy_pass http://fixmind_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://fixmind_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}

